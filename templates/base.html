<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Civic Lens — A municipal transparency portal for citizens to explore budgets, submit feedback, and participate in civic governance.">
    <title>{% block title %}Civic Lens — Municipal Transparency Portal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-background text-on-background font-sans antialiased">
    {% block body %}{% endblock %}
    <script>
        // Initialize Lucide icons
        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
