services:
  - type: web
    name: civic-lens
    env: python
    buildCommand: "pip install -r requirements.txt && python seed_db.py"
    startCommand: "gunicorn run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: "sqlite:///instance/civic_lens.db"
      - key: GEMINI_API_KEY
        sync: false
